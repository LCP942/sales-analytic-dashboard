spring.application.name=sales-dashboard

# DataSource (MySQL) — override via env vars in production (Railway injects DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/sales_dashboard}
spring.datasource.username=${DATABASE_USER:dashboard}
spring.datasource.password=${DATABASE_PASSWORD:dashboard}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 in-memory datasource — used for write operations (customers + orders created in-app)
# REFERENTIAL_INTEGRITY=FALSE: orders can reference MySQL customer IDs without H2 FK checks
app.datasource.h2.url=jdbc:h2:mem:salesdb;DB_CLOSE_DELAY=-1;REFERENTIAL_INTEGRITY=FALSE
app.datasource.h2.driver-class-name=org.h2.Driver
app.datasource.h2.username=sa
app.datasource.h2.password=
# H2 console available at /h2-console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Virtual threads — Java 21 / Spring Boot 3.2+
# Enables project Loom: each request runs on a lightweight virtual thread instead of
# a platform thread, allowing the server to handle many more concurrent connections.
spring.threads.virtual.enabled=true

# CORS — comma-separated list of allowed front-end origins
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}
