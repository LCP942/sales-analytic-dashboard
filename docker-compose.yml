services:

  mysql:
    build:
      context: ./docker/mysql
      dockerfile: Dockerfile
    container_name: sales-dashboard-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sales_dashboard
      MYSQL_USER: dashboard
      MYSQL_PASSWORD: dashboard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dashboard", "-pdashboard"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales-dashboard-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/sales_dashboard
      DATABASE_USER: dashboard
      DATABASE_PASSWORD: dashboard
      CORS_ORIGINS: http://localhost:4200
    volumes:
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NG_APP_API_URL: http://localhost:8080/api
    container_name: sales-dashboard-ui
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_logs:
