services:

  mysql:
    image: mysql:8.4
    container_name: sales-dashboard-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sales_dashboard
      MYSQL_USER: dashboard
      MYSQL_PASSWORD: dashboard
    ports:
      - "3306:3306"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -u dashboard -pdashboard sales_dashboard -e 'SELECT 1 FROM products LIMIT 1' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sales-dashboard-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/sales_dashboard
      DATABASE_USER: dashboard
      DATABASE_PASSWORD: dashboard
      CORS_ORIGINS: http://localhost:4200
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sales-dashboard-ui
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
