<div class="grid grid-cols-[repeat(auto-fit,minmax(220px,1fr))] gap-4">
  @for (card of cards(); track card.label) {
    <div class="card p-5 kpi-card">
      <div class="flex items-center justify-between mb-2">
        <span class="text-[11px] font-medium text-slate-500 dark:text-slate-400 uppercase tracking-[0.05em]">{{ card.label }}</span>
        <span class="material-icons text-[20px] text-slate-400 dark:text-slate-500">{{ card.icon }}</span>
      </div>
      <p class="m-0 mb-2 text-[32px] font-bold text-slate-900 dark:text-slate-50 kpi-card__value">
        {{ card.prefix }}<span
          [countUp]="card.numericValue"
          [countUpDecimals]="card.decimals"
          [countUpDuration]="700">
        </span>
      </p>
      <span class="inline-flex items-center gap-[3px] py-0.5 px-2 rounded-full text-xs font-medium kpi-card__delta"
            [class.up]="card.growth >= 0"
            [class.down]="card.growth < 0"
            [class.bg-green-50]="card.growth >= 0"
            [class.text-green-700]="card.growth >= 0"
            [class.bg-red-50]="card.growth < 0"
            [class.text-red-600]="card.growth < 0">
        {{ card.growth >= 0 ? '▲' : '▼' }} {{ card.growth | number:'1.1-1' }}%
      </span>
    </div>
  }
</div>
