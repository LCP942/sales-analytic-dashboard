@if (loading.isLoading()) {
  <mat-progress-bar mode="indeterminate" class="!fixed !top-0 !inset-x-0 !z-[1000]" />
}

<header class="hidden max-md:flex fixed top-0 inset-x-0 h-14 bg-slate-800 text-slate-50 items-center gap-3 px-4 z-[200]">
  <button class="bg-transparent border-none text-slate-50 cursor-pointer flex items-center p-1.5 rounded transition-colors hover:bg-white/10"
          (click)="toggleSidebar()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="text-lg font-bold tracking-wide">SalesDash</span>
</header>

<div class="flex h-screen overflow-hidden max-md:h-dvh max-md:pt-14">
  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/50 z-[99]" (click)="closeSidebar()"></div>
  }
  <app-sidebar [isOpen]="sidebarOpen()" />
  <main class="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-900">
    <router-outlet />
  </main>
</div>
